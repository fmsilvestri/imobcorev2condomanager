kind = "web"
previewPath = "/"
title = "ImobCore v2"
version = "1.0.0"
id = "artifacts/imobcore-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21216
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/imobcore-frontend run dev"

[services.env]
PORT = "21216"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/imobcore-frontend", "run", "build"]
publicDir = "artifacts/imobcore-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
